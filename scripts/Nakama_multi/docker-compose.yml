version: "3"
services:
  postgres:
	container_name: postgres
	image: postgres:12.2-alpine
	environment:
	  - POSTGRES_DB=nakama
	  - POSTGRES_PASSWORD=localdb
	volumes:
	  - data:/var/lib/postgresql/data
	ports:
	  - "5432:5432"
	healthcheck:
	  test: ["CMD", "pg_isready", "-U", "postgres", "-d", "nakama"]
	  interval: 3s
	  timeout: 3s
	  retries: 5

  nakama:
	container_name: nakama
	image: registry.heroiclabs.com/heroiclabs/nakama:3.22.0
	entrypoint:
	  - "/bin/sh"
	  - "-ecx"
	  - >
		/nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama?sslmode=disable &&
		exec /nakama/nakama
		--name nakama1
		--database.address postgres:localdb@postgres:5432/nakama?sslmode=disable
		--logger.level DEBUG
		--session.token_expiry_sec 7200
		--socket.server_key "admin"
		--runtime.js_entrypoint "/nakama/data/modules/index.js"
	restart: always
	depends_on:
	  postgres:
		condition: service_healthy
	volumes:
	  # Monte le JS compilé (build/index.js) dans Nakama
	  # Lancer: cd scripts/Nakama_multi/modules && npm install && npm run build
	  - ./modules/build:/nakama/data/modules
	ports:
	  - "7349:7349"
	  - "7350:7350"
	  - "7351:7351"
	healthcheck:
	  test: ["CMD", "/nakama/nakama", "healthcheck"]
	  interval: 10s
	  timeout: 5s
	  retries: 5

volumes:
  data:
